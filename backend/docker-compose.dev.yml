services:
  postgres:
    image: postgres:16-alpine
    container_name: groupware-postgres-dev
    environment:
      POSTGRES_DB: groupware_dev
      POSTGRES_USER: groupware
      POSTGRES_PASSWORD: groupware1234
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - groupware_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U groupware -d groupware_dev" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  groupware_pgdata_dev:

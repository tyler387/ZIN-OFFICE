server:
  port: ${PORT:8080}

spring:
  application:
    name: groupware

  # H2 인메모리 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:groupware
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 콘솔 (개발용)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # 멀티파트 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 설정
jwt:
  secret: dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGdyb3Vwd2FyZSBqd3QgdG9rZW4gZ2VuZXJhdGlvbiEhIQ==
  access-token-validity: 3600000    # 1시간 (밀리초)
  refresh-token-validity: 604800000 # 7일 (밀리초)

# 파일 업로드 경로
file:
  upload-dir: ./uploads
